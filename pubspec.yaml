name: special_coffee
description: SpecialCoffee AI — Q Grader digital para producción y preparación de café de especialidad.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^14.6.1

  # Immutable models & serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local DB (offline-first)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5

  # Networking — PostgREST + Auth service
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1
  connectivity_plus: ^6.1.0

  # Gemini AI
  google_generative_ai: ^0.4.7

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  logger: ^2.5.0
  equatable: ^2.0.5

  # Firebase — core + push notifications (Android / iOS only)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # OneSignal — push notifications cross-platform (Android / iOS)
  onesignal_flutter: ^5.2.0

  # GPS — altitud y coordenadas para clima automático
  geolocator: ^13.0.2

  # Notifications + timezone (zonedSchedule — works with app closed)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^1.0.4

  # Local key-value cache (reglas IA, clima, preferencias)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI helpers
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # QR code generation
  qr_flutter: ^4.1.0

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.15.0
  freezed: ^3.0.0
  riverpod_generator: ^4.0.0
  json_serializable: ^6.8.0
  drift_dev: ^2.21.0
  sqlite3: ^2.9.4

  # Habilitados 2026-05-27: resuelven con custom_lint 0.8.1 + riverpod_lint 3.1.0
  # y analyzer 8.4.0 (compatible con el ecosistema actual).
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0


flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/rules/

  fonts:
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
        - asset: assets/fonts/DMSerifDisplay-Italic.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
