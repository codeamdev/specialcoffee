name: special_coffee
description: SpecialCoffee AI — Q Grader digital para producción y preparación de café de especialidad.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^14.6.1

  # Immutable models & serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local DB (offline-first)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5

  # Networking — PostgREST + Auth service
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1
  connectivity_plus: ^6.1.0

  # Gemini AI
  google_generative_ai: ^0.4.7

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  logger: ^2.5.0
  equatable: ^2.0.5

  # Notifications + timezone (zonedSchedule — works with app closed)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^1.0.4

  # UI helpers
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.15.0
  freezed: ^3.0.0
  riverpod_generator: ^4.0.0
  json_serializable: ^6.8.0
  drift_dev: ^2.21.0

  # Habilitados 2026-05-27: resuelven con custom_lint 0.8.1 + riverpod_lint 3.1.0
  # y analyzer 8.4.0 (compatible con el ecosistema actual).
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0


flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/rules/

