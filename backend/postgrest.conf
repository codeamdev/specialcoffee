# =============================================================================
# PostgREST Configuration — SpecialCoffee AI
# Documentación: https://postgrest.org/en/stable/configuration.html
# =============================================================================

# Conexión a PostgreSQL
# Formato: postgres://rol:password@host:puerto/base_de_datos
db-uri = "postgres://postgrest_auth:sc_pgrst_2025@localhost:5432/specialcoffee"

# Schema que PostgREST expone como API
db-schema = "public"

# Rol anónimo (usuarios sin JWT)
db-anon-role = "anon"

# Puerto donde escucha PostgREST
server-port = 3001

# Host (solo local — Nginx hace el proxy hacia fuera)
server-host = "127.0.0.1"

# Secret para validar los JWT que emite el auth service
# DEBE ser idéntico al JWT_SECRET del auth service (main.py)
# Mínimo 32 caracteres, generar con: openssl rand -base64 32
jwt-secret = "specialcoffee_dev_local_secret_2025_ok"

# Tiempo de expiración del caché del schema (segundos)
# 300 en producción para evitar re-introspección en cada request
db-schema-cache-ttl = 300

# Máximo de conexiones al pool
db-pool = 10

# Log level: crit | error | warn | info
log-level = "warn"
