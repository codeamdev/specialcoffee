events {}

http {
    server {
        listen 3001;

        location / {
            # Preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  *;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Accept, Range, Origin";
                add_header Access-Control-Max-Age       600;
                add_header Content-Length               0;
                return 204;
            }

            proxy_pass http://postgrest:3000;

            # Ocultar headers CORS de PostgREST para evitar duplicados
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_hide_header Access-Control-Max-Age;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Accept, Range, Origin" always;
            add_header Access-Control-Expose-Headers "Content-Range, X-Total-Count" always;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header Authorization     $http_authorization;
            proxy_pass_header Content-Range;
        }
    }
}
