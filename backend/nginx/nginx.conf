events {}

http {
    server_tokens off;

    # 30 req/min por IP — suficiente para sync en background + llamadas UI
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    server {
        listen 80;

        # ── Auth service (FastAPI) ────────────────────────────────────────────
        location /auth/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass       http://auth:8000/auth/;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        location /users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass       http://auth:8000/users/;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # ── PostgREST — strip /api prefix ────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  *;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Accept, Range, Origin";
                add_header Access-Control-Max-Age       600;
                add_header Content-Length               0;
                return 204;
            }

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://postgrest:3000;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_hide_header Access-Control-Max-Age;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Accept, Range, Origin" always;
            add_header Access-Control-Expose-Headers "Content-Range, X-Total-Count" always;

            add_header X-Content-Type-Options "nosniff"         always;
            add_header X-Frame-Options        "DENY"            always;
            add_header Referrer-Policy        "no-referrer"     always;
            add_header Permissions-Policy     "geolocation=()"  always;

            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Content-Range;
        }
    }
}
