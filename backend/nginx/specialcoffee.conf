# =============================================================================
# Nginx — SpecialCoffee AI reverse proxy
# Ubicar en: /etc/nginx/sites-available/specialcoffee
# Activar con: sudo ln -s /etc/nginx/sites-available/specialcoffee /etc/nginx/sites-enabled/
# =============================================================================

server_tokens off;

# Zona de rate limiting para endpoints de autenticación (5 req/min por IP)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# Zona general para la API de datos
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name specialcoffee.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name specialcoffee.app;

    # Certificados SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/specialcoffee.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/specialcoffee.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                              always;
    add_header X-Frame-Options          "DENY"                                always;
    add_header Referrer-Policy          "no-referrer"                         always;
    add_header Permissions-Policy       "geolocation=()"                      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tamaño máximo de payload (fotos en v2)
    client_max_body_size 10M;

    # ── Auth service (Python FastAPI en puerto 8000) ─────────────────────
    location /auth/login {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /auth/register {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── PostgREST API (en puerto 3000) ───────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        # Quitar el prefijo /api antes de pasar a PostgREST
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # CORS — dominio de producción
        add_header 'Access-Control-Allow-Origin'  'https://specialcoffee.app' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Prefer, Range' always;
        add_header 'Vary'                         'Origin' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_read_timeout 30s;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
