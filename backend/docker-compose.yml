# SpecialCoffee AI — Backend local
# PostgreSQL corre nativo en el host (fuera de Docker)
# Windows/Mac: DB_HOST=host.docker.internal (Docker Desktop resuelve automáticamente)
# Linux:       DB_HOST=host.docker.internal + extra_hosts resuelve via host-gateway
# Uso: docker compose up

services:

  auth:
    build: ./auth
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      AUTH_PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    cpus: "0.50"

  postgrest:
    image: postgrest/postgrest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PGRST_DB_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}"
      PGRST_DB_SCHEMA: "public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: "${JWT_SECRET}"
      PGRST_DB_POOL: "5"
      PGRST_LOG_LEVEL: "info"
      PGRST_DB_SCHEMA_CACHE_TTL: "0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    cpus: "0.25"

  nginx:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - postgrest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/api/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 64m
    cpus: "0.25"
